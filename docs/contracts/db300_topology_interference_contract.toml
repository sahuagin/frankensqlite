[[case]]
case_id = "same_core_serialized"
case_kind = "same_core"
placement_profile_id = "recommended_pinned"
primitive_class = "topology_interference_smoke"
selector_strategy = "bind both probe lanes to the same logical CPU so interference is forced onto one core even without SMT."
availability_guard = "Requires at least one online CPU in the topology bundle."
cpu_pair_contract = "cpu_pair[0] == cpu_pair[1]"
smt_relationship = "same_logical_cpu"

[[case]]
case_id = "smt_sibling_pair"
case_kind = "smt_sibling"
placement_profile_id = "recommended_pinned"
primitive_class = "topology_interference_smoke"
selector_strategy = "Choose the first thread_siblings_list entry with at least two distinct logical CPUs."
availability_guard = "Requires threads_per_core >= 2 and a sibling set with two distinct logical CPUs."
cpu_pair_contract = "cpu_pair[0] != cpu_pair[1] and both CPUs appear in the same thread_siblings_list entry"
smt_relationship = "siblings_same_core"

[[case]]
case_id = "same_llc_diff_core_pair"
case_kind = "same_llc"
placement_profile_id = "recommended_pinned"
primitive_class = "topology_interference_smoke"
selector_strategy = "Choose the first shared_cpu_list entry that contains two logical CPUs from different sibling sets."
availability_guard = "Requires one LLC domain with at least two non-sibling logical CPUs."
cpu_pair_contract = "cpu_pair[0] != cpu_pair[1], both CPUs appear in the same shared_cpu_list entry, and they are not SMT siblings"
smt_relationship = "not_siblings_same_llc"

[first_slice]
slice_id = "g8_1_case_resolution_smoke"
entrypoint = "scripts/verify_g8_1_same_core_smt_interference.sh"
topology_bundle_dependency = "scripts/verify_bd_db300_1_6_1_topology_bundle.sh"
contract_test = "cargo test -p fsqlite-harness --test bd_db300_7_8_1_same_core_smt_interference_contract -- --nocapture"
required_event_families = ["topology_case_resolution", "verification_bundle_summary"]
required_artifacts = [
  "manifest.json",
  "case_matrix.json",
  "structured_logs.ndjson",
  "summary.md",
  "rerun_entrypoint.sh",
  "topology_bundle/hardware_discovery_bundle.json",
  "topology_bundle/hardware_discovery_summary.md",
]
success_rule = "The operator entrypoint must render all required artifacts, resolve all three case_ids deterministically to available or unavailable, and publish stable selector metadata for replay."
