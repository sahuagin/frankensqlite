# DB300 Same-Core / SMT / Same-LLC Interference Contract v1.0.0
#
# Bead: bd-db300.7.8.1
# Purpose: define the operator entrypoint, case matrix, structured-log fields,
# artifact layout, and first harness slice for replayable topology interference
# verification built on the existing topology bundle and artifact contracts.

[meta]
schema_version = "1.0.0"
bead_id = "bd-db300.7.8.1"
track_id = "bd-db300.7.8"
generated_at = "2026-03-23"
contract_owner = "db300-track-g8-topology-interference"
operator_entrypoint = "scripts/verify_g8_1_same_core_smt_interference.sh"
topology_bundle_contract_ref = "scripts/verify_bd_db300_1_6_1_topology_bundle.sh"
artifact_manifest_contract_ref = "crates/fsqlite-e2e/src/fixture_select.rs"
structured_logging_contract_ref = "db300_structured_logging_contract.toml"

[global_defaults]
event_schema_id = "fsqlite.db300.topology_interference_event.v1"
case_matrix_schema_id = "fsqlite.db300.topology_interference_case_matrix.v1"
artifact_manifest_schema_id = "fsqlite.db300.topology_interference_manifest.v1"
run_identity_schema_id = "fsqlite.db300.run_identity.v1"
default_surface_id = "g8_1_topology_interference_suite"
default_pillar_id = "G8"
default_primitive_class = "topology_interference_smoke"
default_placement_profile_id = "recommended_pinned"
default_hardware_class_id = "linux_x86_64_many_core_numa"
concurrent_writer_requirement = "Concurrent-writer mode stays ON by default; this suite may pin, classify, or replay topology cases but must not serialize writers or disable MVCC defaults."
missing_case_policy = "If a topology relation cannot be resolved, publish availability=unavailable with an explicit unavailability_reason instead of inventing a cpu_pair or silently falling back."
replay_policy = "Every artifact pack must contain rerun_entrypoint.sh plus the exact selector values and topology bundle paths needed to regenerate the same case matrix mechanically."
mechanical_comparison_policy = "Mechanical comparison is allowed only when case_id, primitive_class, placement_profile_id, hardware_class_id, hardware_signature, cpu_pair_signature, source_revision, and beads_data_hash match."
first_slice_id = "g8_1_case_resolution_smoke"
first_slice_goal = "Resolve the same_core_serialized, smt_sibling_pair, and same_llc_diff_core_pair selectors from a real topology bundle and package them with stable logs and replay metadata before measurement loops are added."

