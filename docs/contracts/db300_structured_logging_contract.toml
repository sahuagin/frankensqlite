# DB300 Structured Logging / Run-Identity Contract v1.0.0
#
# Bead: bd-db300.7.6.1
# Purpose: define the canonical structured logging schema and run-identity
# contract for verification, benchmark, and controller proof surfaces so later
# beads can add emitters and packages without inventing new field names.

[meta]
schema_version = "1.0.0"
bead_id = "bd-db300.7.6.1"
track_id = "bd-db300.7.6"
generated_at = "2026-03-23"
contract_owner = "db300-track-g-structured-logging"
artifact_manifest_contract_ref = "crates/fsqlite-e2e/src/fixture_select.rs"
regime_atlas_contract_ref = "db300_regime_atlas_contract.toml"
shadow_oracle_contract_ref = "db300_shadow_oracle_contract.toml"
policy_snapshot_contract_ref = "db300_policy_snapshot_contract.toml"

[global_defaults]
event_schema_id = "fsqlite.db300.structured_log_event.v1"
run_identity_schema_id = "fsqlite.db300.run_identity.v1"
mechanical_comparison_schema_id = "fsqlite.db300.mechanical_comparison.v1"
id_pattern = "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
concurrent_writer_requirement = "Concurrent-writer mode stays ON by default; no log contract, replay path, or controller package may disable MVCC defaults or serialize writers for convenience."
missing_field_policy = "Any missing required field, topology disclosure, or provenance identifier is an observability_gap blocker rather than an optional omission."
serialization_policy = "Emit UTF-8 JSON with stable snake_case field names, finite numeric values, integer counters for counts or durations, and sorted keys whenever a standalone artifact is rendered."
topology_policy = "Placement-sensitive runs must disclose placement_profile_id, hardware_class_id, hardware_signature, cpu_affinity_mask, smt_policy_state, memory_policy, helper_lane_cpu_set, and numa_balancing_state."
comparison_policy = "Mechanical comparison joins on canonical run identity and event family, ignores only declared ephemeral fields, and yields not_comparable when placement or topology disclosures differ."

[common_fields]
required_fields = [
  "schema_version",
  "trace_id",
  "scenario_id",
  "bead_id",
  "run_id",
  "phase",
  "event_type",
  "outcome",
  "timestamp",
  "message",
  "surface_id",
  "pillar_id",
  "event_family",
]

[run_identity]
required_fields = [
  "fixture_id",
  "workload",
  "concurrency",
  "mode_id",
  "build_profile_id",
  "placement_profile_id",
