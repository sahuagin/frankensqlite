  "placement_profile_id",
  "hardware_class_id",
  "hardware_signature",
  "cpu_affinity_mask",
  "smt_policy_state",
  "memory_policy",
  "helper_lane_cpu_set",
  "numa_balancing_state",
]

[artifact_lineage]
always_required = [
  "trace_id",
  "scenario_id",
  "bead_id",
  "run_id",
  "claim_id",
  "evidence_id",
  "evidence_root",
  "baseline_comparator",
]
