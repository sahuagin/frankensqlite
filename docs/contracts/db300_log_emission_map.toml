  "unexpected_field_count",
  "artifact_manifest_key",
  "bundle_kind",
  "replay_command",
  "first_failure_summary",
  "first_failure_stage",
  "first_failure_artifact",
  "diagnostic_json_pointer",
  "log_family",
]
expected_artifacts = ["nocapture_stdout", "fresh_eyes_review_note"]
negative_path_expectation = "Prepared-path wins are invalid if the helper fails to emit stale-cache or invalidation diagnostics when a failure occurs."
gap_conversion_rule = "Any new prepared-cache or schema-reload helper must either join this emitter family or add a new unit family before it can close a bead."
notes = "This family is the operator-facing map for unit helpers that prove cache-hit, invalidation, and retry semantics behind D-track low-tax changes."

