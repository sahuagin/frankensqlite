# DB300 Log Emission Map v1.0.0
#
# Bead: bd-db300.7.6.2
# Purpose: pin the exact unit, e2e, perf, failure, and decision-plane
# entrypoints that must emit structured logging so later suites and runtime
# rewrites cannot silently bypass observability.

[meta]
schema_version = "1.0.0"
bead_id = "bd-db300.7.6.2"
track_id = "bd-db300.7.6"
generated_at = "2026-03-24"
contract_owner = "db300-track-g-emission-map"
structured_logging_contract_ref = "docs/contracts/db300_structured_logging_contract.toml"
verification_matrix_contract_ref = "db300_verification_matrix.toml"
validation_matrix_contract_ref = "db300_validation_matrix.toml"
artifact_bundle_contract_ref = "scripts/verify_g6_3_artifact_bundle_shape.sh"

[global_defaults]
default_operator_manifest = "scripts/verify_g6_2_log_emission_map.sh"
missing_event_policy = "If a required emitter family or event family is absent for a named execution path, treat the run as an observability_gap blocker rather than a soft warning."
missing_field_policy = "If a required field is missing from a structured log emitted by a mapped entrypoint, fail the validation surface and attach first-failure diagnostics."
gap_conversion_rule = "Any newly discovered execution path that does not match an emitter family here must add or revise a contract row before it can be treated as compliant."
failure_bundle_rule = "Failure-producing paths must emit failure_bundle_summary plus first-failure diagnostics even when a run aborts early or only partial artifacts exist."
concurrent_writer_requirement = "Concurrent-writer mode stays ON by default; no logging, rerun, or failure-packaging entrypoint may disable MVCC defaults or serialize writers for convenience."

[coverage_log_fields]
required_fields = [
  "trace_id",
  "scenario_id",
  "bead_id",
  "run_id",
  "emitter_family",
  "entrypoint_name",
  "required_event_family",
  "required_field_count",
  "missing_field_count",
  "unexpected_field_count",
  "artifact_manifest_key",
  "first_failure_summary",
  "first_failure_stage",
  "first_failure_artifact",
  "diagnostic_json_pointer",
]

[artifact_linkage_fields]
required_fields = [
  "artifact_manifest_key",
  "bundle_kind",
  "replay_command",
]

[surface_class_policy]
required_classes = ["unit", "e2e", "perf", "failure", "decision_plane"]

