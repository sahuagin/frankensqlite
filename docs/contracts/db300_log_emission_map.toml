mode_scope = ["mvcc", "single_writer"]
mandatory_when = [
  "Any prepared-cache invalidation, full reload, restart, rollback, or retry helper is used as closure evidence.",
  "Any ad-hoc single-statement reuse claim depends on prepared-path fast-lane counters or stale-cache negative proofs.",
]
